<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupleStock – Usuários</title>
    <link rel="icon" type="image/png" href="img/logo.png"/>
    <link rel="stylesheet" href="produtos.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="img/logo.png" alt="SupleStock Logo" style="width:36px; height:36px; object-fit:contain;" />
      <span class="logo-text">SupleStock</span>
    </div>

    <nav class="sidebar-nav">
      <a href="produtos.html" class="nav-item">
        <img src="img/logo.png" alt="logo" style="width:20px; height:20px; object-fit:contain; filter:brightness(10);" />
        <span>Estoque</span>
      </a>
      <a href="cadastro_usuario.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="7" r="4"/>
          <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
          <path d="M16 11l2 2 4-4"/>
        </svg>
        <span>Usuários</span>
      </a>
    </nav>

    <a href="index.html" class="sidebar-logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Sair</span>
    </a>
  </aside>

  <div class="main-wrapper">

    <header class="topbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Buscar usuários..." />
      </div>
      <div class="user-badge">
        <div class="user-avatar">J</div>
        <span class="user-name">João</span>
      </div>
    </header>

    <main class="content">
      <section class="card form-card">
        <h2>Cadastrar Usuário</h2>
        <form id="userForm">
          <div class="form-group">
            <label for="nome">NOME COMPLETO</label>
            <input type="text" id="nome" placeholder="Ex.: João Silva" required />
          </div>
          <div class="form-group">
            <label for="email">E-MAIL</label>
            <input type="email" id="email" placeholder="usuario@email.com" required />
          </div>
          <div class="form-group">
            <label for="perfil">PERFIL DE ACESSO</label>
            <select id="perfil" required>
              <option value="">Selecione um Perfil</option>
              <option value="Administrador">Administrador</option>
              <option value="Gerente">Gerente</option>
              <option value="Operador">Operador</option>
            </select>
          </div>
          <div class="form-group">
            <label for="senha">SENHA</label>
            <input type="password" id="senha" placeholder="••••••••••" required />
          </div>
          <button type="submit" class="btn-primary">CADASTRAR USUÁRIO</button>
        </form>
      </section>

      <section class="card table-card">
        <div class="table-header">
          <h2>Usuários Cadastrados</h2>
          <div class="filter-group">
            <label>Filtrar por:</label>
            <select id="filtroPerfil">
              <option value="Todos">Todos</option>
              <option value="Administrador">Administrador</option>
              <option value="Gerente">Gerente</option>
              <option value="Operador">Operador</option>
            </select>
          </div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>NOME</th>
                <th>E-MAIL</th>
                <th>PERFIL</th>
                <th>STATUS</th>
                <th>CADASTRO</th>
              </tr>
            </thead>
            <tbody id="usuariosTabela"></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="usuario.js"></script>
</body>
</html>
