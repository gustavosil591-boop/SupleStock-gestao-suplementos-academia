<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/png" href="img/logo.png"/>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <div class="auth-container">
        <aside class="auth-left">
            <div class="brand">
                <img class="logo" src="img/logo.png" alt="SupleStock logo">
                <h1>SupleStock</h1>
                <p>Gerencie seu estoque com inteligência</p>
            </div>
        </aside>

        <section class="auth-right">
            <div class="auth-card">
                <h2>Bem-vindo de volta</h2>
                <p class="lead">Entre com suas credenciais</p>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="••••••••">
                </div>

                <button id="btnLogin" class="btn-primary">ENTRAR</button>

                <div class="divider">Ou continue com</div>

                <button class="social-btn google">Entrar com o Google</button>

                <div class="links muted">Não tem uma conta? <a href="signup.html">Criar conta</a></div>
            </div>
        </section>
    </div>

    <script>
        document.getElementById('btnLogin').addEventListener('click', () => {
           window.location.href = 'produtos.html';
        });
    </script>
</body>
</html>
