<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo</title>
    <link rel="stylesheet" href="style_.css">
</head>
<body>
    <header>
        <img src="img/logo.png" alt="Logo do Site" class="logo">
        <h1>SupleStock</h1>
        <p>Gerencie seu estoque com inteligência</p>
    </header>
    <main>
        <h1>Bem-vindo de volta</h1>
        <p>Entre com suas credenciais</p>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com">
        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" placeholder="***********">
        <button type="submit" id="btn">Entrar</button>

        <p>Ou continue com</p>
        <button class="social-btn google">Google</button>

        <p>Não tem uma conta? <a href="signup.html">Criar conta</a></p>
    </main>
    <footer>
        
    </footer>
    <script>
        document.getElementById('btn').addEventListener('click', () => {
        window.location.href = 'cadastrar_produto.html';
        });
    </script>
</html>
