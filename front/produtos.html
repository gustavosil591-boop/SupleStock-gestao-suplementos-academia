<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupleStock – Estoque</title>
  <link rel="stylesheet" href="produtos.css" />
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
  <img src="img/logo.png" alt="SupleStock Logo" style="width:36px; height:36px; object-fit:contain;" />
  <span class="logo-text">SupleStock</span>
</div>

    <nav class="sidebar-nav">
      <a href="produtos.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="7" height="7" rx="1"/>
          <rect x="15" y="3" width="7" height="7" rx="1"/>
          <rect x="2" y="14" width="7" height="7" rx="1"/>
          <rect x="15" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Estoque</span>
      </a>
      <a href="cadastro_usuario.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="7" r="4"/>
          <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
          <path d="M16 11l2 2 4-4"/>
        </svg>
        <span>Usuários</span>
      </a>
    </nav>

    <a href="login.html" class="sidebar-logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Sair</span>
    </a>
  </aside>

  <div class="main-wrapper">

 
    <header class="topbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Buscar produtos..." />
      </div>
      <div class="user-badge">
        <div class="user-avatar">J</div>
        <span class="user-name">João</span>
      </div>
    </header>

    <main class="content">

      <section class="card form-card">
        <h2>Cadastrar Produto</h2>

        <div id="mensagem" style="display:none; padding:10px; border-radius:6px; margin-bottom:14px; font-size:0.85rem;"></div>

        <form id="form-suplemento">

          <div class="form-group">
            <label for="nome">Nome do Produto</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: Whey Protein Isolado" required />
          </div>

          <div class="form-group">
            <label for="categoria">Categoria</label>
            <select id="categoria" name="categoria" required>
              <option value="" disabled selected>Selecione uma Categoria</option>
              <option value="Proteína">Proteína</option>
              <option value="Creatina">Creatina</option>
              <option value="BCAA">BCAA</option>
              <option value="Vitaminas">Vitaminas</option>
              <option value="Pré-treino">Pré-treino</option>
              <option value="Outros">Outros</option>
            </select>
          </div>

          <div class="form-group">
            <label for="quantidade">Quantidade</label>
            <input type="number" id="quantidade" name="quantidade" min="0" placeholder="0" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="precoCusto">Preço de Custo</label>
              <input type="number" id="precoCusto" name="precoCusto" step="0.01" placeholder="R$ 0,00" required />
            </div>
            <div class="form-group">
              <label for="precoVenda">Preço de Venda</label>
              <input type="number" id="precoVenda" name="precoVenda" step="0.01" placeholder="R$ 0,00" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="lote">Lote</label>
              <input type="text" id="lote" name="lote" placeholder="Ex: L12345" required />
            </div>
            <div class="form-group">
              <label for="validade">Validade</label>
              <input type="date" id="validade" name="validade" required />
            </div>
          </div>

          <button type="submit" class="btn-primary">ADICIONAR PRODUTO</button>

        </form>
      </section>

      <section class="card table-card">
        <div class="table-header">
          <h2>Estoque Atual</h2>
          <div class="filter-group">
            <label>Filtrar por:</label>
            <select id="filtro-categoria">
              <option value="Todas">Todas as Categorias</option>
              <option value="Proteína">Proteína</option>
              <option value="Creatina">Creatina</option>
              <option value="BCAA">BCAA</option>
              <option value="Vitaminas">Vitaminas</option>
              <option value="Pré-treino">Pré-treino</option>
              <option value="Outros">Outros</option>
            </select>
          </div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>PRODUTO</th>
                <th>CATEGORIA</th>
                <th>QUANTIDADE</th>
                <th>CUSTO</th>
                <th>VENDA</th>
                <th>LOTE</th>
                <th>VALIDADE</th>
                <th>AÇÕES</th>
              </tr>
            </thead>
            <tbody id="tabela-corpo">
              <tr>
                <td colspan="8" style="text-align:center; color:#aaa; padding:24px;">
                  Carregando produtos...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
